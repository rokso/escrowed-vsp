name: Tests
on:
  pull_request:
    paths:
      - "test/*.ts"
      - "contracts/**/*.sol"
      - "deploy/**/*.ts"
      - package*.json

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3.3.0
        with:
          submodules: true
      - run: cat "${GITHUB_WORKSPACE}/.github/env.properties" >> $GITHUB_ENV

      - name: Use Node.js
        uses: actions/setup-node@v3.6.0
        with:
          node-version-file: ".nvmrc"

      - name: Run npm install
        run: npm i

      - name: Running tests
        run: npm t
